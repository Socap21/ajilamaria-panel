# ============================================================
#  Ají la María · Panel de Control · configuración Cloudflare
# ============================================================
#
#  Nota de seguridad: 'database_id' NO es un secreto (acceder a la
#  base de datos requiere autenticación de tu cuenta de Cloudflare).
#  Aun así, este archivo usa un placeholder para mantener la plantilla
#  limpia y reutilizable. Reemplázalo por el id que obtienes con:
#      npx wrangler d1 create ajilamaria
# ------------------------------------------------------------

# Nombre del Worker. Para actualizar un Worker existente y conservar
# su dominio personalizado, usa exactamente el mismo nombre.
name = "ajilamaria"

main = "src/worker.js"
compatibility_date = "2024-11-06"

# --- Frontend (archivos estáticos servidos por el Worker) ---
[assets]
directory = "./public"
binding = "ASSETS"

# --- Base de datos Cloudflare D1 ---
[[d1_databases]]
binding = "DB"
database_name = "ajilamaria"
database_id = "<TU_DATABASE_ID>"
